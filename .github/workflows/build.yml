name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Build
        run: mvn -B package

      - name: Upload NBM
        uses: actions/upload-artifact@v4
        with:
          name: netbeans-golang-nbm
          path: target/*.nbm
          if-no-files-found: error
